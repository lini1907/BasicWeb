<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Colorado Experience</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      background: #dbe8f5;
      color: #222;
    }
    .page {
      width: min(1100px, 96vw);
      margin: 10px auto;
      border: 3px solid #2f5ec2;
      background: #f3efe0;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.22);
    }
    .header {
      height: 130px;
      border-bottom: 2px solid #2f5ec2;
      background: #b9c9ee;
    }
    .content-wrapper {
      display: flex;
      min-height: calc(100vh - 170px);
    }
    .sidebar {
      width: 210px;
      border-right: 2px solid #d0d0d0;
      background: #ece9de;
    }
    .main-content {
      flex: 1;
      background: #f3efe0;
    }
    iframe {
      width: 100%;
      border: none;
      display: block;
    }
    .header iframe {
      height: 128px;
    }
    .sidebar iframe,
    .main-content iframe {
      min-height: calc(100vh - 172px);
    }
    @media (max-width: 900px) {
      .content-wrapper { flex-direction: column; }
      .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 2px solid #d0d0d0;
      }
      .sidebar iframe { min-height: 320px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <iframe src="Logo.html" title="Logo"></iframe>
    </div>
    <div class="content-wrapper">
      <div class="sidebar">
        <iframe src="Link.html" title="Navigation"></iframe>
      </div>
      <div class="main-content">
        <iframe src="Homepage.html" name="contentFrame" title="Content"></iframe>
      </div>
    </div>
  </div>
</body>
</html>
